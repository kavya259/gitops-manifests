apiVersion: apps/v1
kind: Deployment
metadata:
  name: guestbook-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: guestbook-ui
  template:
    metadata:
      labels:
        app: guestbook-ui
    spec:
      containers:
      - name: guestbook-ui
        image: kavyagitopsacr.azurecr.io/kavya-app:bab9cd5a275628bec59704245e630bbdf1769afc
        ports:
        - containerPort: 80
